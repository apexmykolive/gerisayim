<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ApexMyKO Valhalla Opening</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#020617;
color:white;
text-align:center;
overflow-x:hidden;
}

/* BG VIDEO */

.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.bg-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(5,15,25,.55);
z-index:-1;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

/* LOGO */

.logo{
width:170px;
margin-bottom:10px;
filter:drop-shadow(0 0 20px rgba(255,170,0,.45));
}

/* HERO GLASS */

.hero{
background:rgba(10,25,45,.45);
backdrop-filter:blur(12px);
border-radius:22px;
padding:35px 25px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 40px rgba(0,0,0,.45);
margin-bottom:50px;
}

/* BADGE */

.badge{
display:inline-block;
background:rgba(255,255,255,.05);
padding:6px 18px;
border-radius:999px;
font-size:12px;
margin-bottom:14px;
border:1px solid rgba(255,255,255,.08);
}

/* TITLE */

.title{
position:relative;
display:inline-block;
font-size:56px;
font-weight:900;
margin-bottom:10px;

background:linear-gradient(
90deg,
#fff3c6,
#ffc400,
#ff9800,
#ffc400,
#fff3c6
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 20px rgba(255,170,0,.35),
0 0 40px rgba(255,140,0,.25);
}

/* TITLE SHINE */

.title::after{
content:"";
position:absolute;
top:0;
left:-40%;
width:25%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.45),
transparent
);

transform:skewX(-20deg);

animation:titleShine 5s infinite;
}

/* SUBTITLE */

.subtitle{
opacity:.8;
margin-bottom:14px;
}

/* META */

.hero-meta{
margin-bottom:15px;
}

.meta-pill{
display:inline-block;
padding:6px 12px;
margin:4px;
background:rgba(255,255,255,.05);
border-radius:10px;
font-size:13px;
border:1px solid rgba(255,255,255,.1);
}

/* PRIZE */

.prize{
display:inline-block;
position:relative;
overflow:hidden;

background:linear-gradient(45deg,#ff9900,#ffc400);
color:#111;

padding:14px 28px;
font-weight:900;
border-radius:12px;

margin:14px 0;

box-shadow:0 0 25px rgba(255,170,0,.6);

transition:.25s;
}

.prize:hover{
transform:scale(1.05);
}

/* PRIZE SHINE */

.prize::after{
content:"";
position:absolute;
top:0;
left:-60%;
width:40%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.55),
transparent
);

transform:skewX(-20deg);

animation:prizeShine 3.5s infinite;
}

/* BUTTONS */

.buttons{
margin:10px 0 20px;
}

.btn{
display:inline-block;
background:#ffb300;
color:#000;
padding:10px 20px;
border-radius:10px;
margin:5px;
text-decoration:none;
font-weight:bold;

transition:.25s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(255,190,0,.8);
}

/* COUNTDOWN */

.countdown{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.box{
background:rgba(255,255,255,.04);
border-radius:14px;
padding:20px 30px;
min-width:140px;

border:1px solid rgba(255,255,255,.08);
}

.number{
font-size:36px;
font-weight:bold;
}

.label{
font-size:12px;
opacity:.7;
}

/* EVENTS */

.section{
margin-top:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:20px;
}

.card img{
width:100%;
border-radius:12px;
transition:.25s;
}

.card img:hover{
transform:scale(1.03);
}

/* ANIMATIONS */

@keyframes prizeShine{

0%{left:-60%}

40%{left:120%}

100%{left:120%}

}

@keyframes titleShine{

0%{left:-40%}

35%{left:120%}

100%{left:120%}

}

</style>
</head>

<body>

<video autoplay muted loop playsinline class="bg-video">
<source src="bg.mp4" type="video/mp4">
</video>

<div class="bg-overlay"></div>

<div class="container">

<img src="apex_logo.png" class="logo">

<div class="hero">

<div class="badge">Official Opening Countdown</div>

<h1 class="title">VALHALLA OPENING</h1>

<div class="subtitle">
03 Nisan 2026 • 22:00 Türkiye
</div>

<div class="hero-meta">
<span class="meta-pill">64 Bit Client</span>
<span class="meta-pill">v1098</span>
<span class="meta-pill">Orj MYKO</span>
</div>

<a class="prize" href="#">
1.500.000 TL ÖDÜL HAVUZU
</a>

<div class="buttons">

<a class="btn" href="https://apexmyko.net">Website</a>
<a class="btn" href="#">Forum</a>
<a class="btn" href="https://discord.gg/apexmyko">Discord</a>

</div>

<div class="countdown">

<div class="box">
<div class="number" id="days">0</div>
<div class="label">GÜN</div>
</div>

<div class="box">
<div class="number" id="hours">0</div>
<div class="label">SAAT</div>
</div>

<div class="box">
<div class="number" id="minutes">0</div>
<div class="label">DAKİKA</div>
</div>

<div class="box">
<div class="number" id="seconds">0</div>
<div class="label">SANİYE</div>
</div>

</div>

</div>

<div class="section">

<h2>Aktif Etkinlikler</h2>

<div class="cards">

<div class="card">
<a href="#"><img src="cekilis_discord.jpg"></a>
</div>

<div class="card">
<a href="#"><img src="cekilis_yorum.jpg"></a>
</div>

<div class="card">
<a href="#"><img src="cekilis_forum.jpg"></a>
</div>

</div>

</div>

</div>

<script>

const target = new Date("2026-04-03T22:00:00+03:00").getTime();

function update(){

const now = new Date().getTime();
const diff = target - now;

const d = Math.floor(diff/(1000*60*60*24));
const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((diff%(1000*60*60))/(1000*60));
const s = Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerText=d;
document.getElementById("hours").innerText=h;
document.getElementById("minutes").innerText=m;
document.getElementById("seconds").innerText=s;

}

setInterval(update,1000);

</script>

</body>
</html>
