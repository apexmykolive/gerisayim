<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ApexMyKO Valhalla Opening</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial;
background:#050b16;
color:white;
overflow-x:hidden;
}

/* VIDEO BACKGROUND */

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
overflow:hidden;
}

.video-bg video{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.35);
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom,rgba(0,0,0,0.2),rgba(0,0,0,0.7));
z-index:1;
}

/* CONTENT */

.container{
position:relative;
z-index:2;
max-width:1100px;
margin:auto;
padding:20px;
text-align:center;
}

.logo{
width:160px;
margin-bottom:10px;
}

/* HERO */

.hero{
background:rgba(10,20,35,0.75);
padding:20px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:0 20px 40px rgba(0,0,0,0.4);
margin-bottom:25px;
}

.badge{
display:inline-block;
background:#0d356b;
padding:6px 16px;
border-radius:20px;
font-size:12px;
letter-spacing:1px;
margin-bottom:10px;
}

.title{
font-size:50px;
font-weight:900;
margin-bottom:10px;
}

.subtitle{
color:#9ed0ff;
margin-bottom:10px;
}

.meta{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

.meta span{
background:#163a66;
padding:6px 12px;
border-radius:10px;
font-size:14px;
}

/* PRIZE */

.prize{
display:inline-block;
background:linear-gradient(45deg,#ff9900,#ffc400);
color:black;
padding:14px 26px;
font-weight:900;
border-radius:12px;
margin-bottom:12px;
text-decoration:none;
box-shadow:0 0 20px rgba(255,170,0,0.5);
transition:0.2s;
}

.prize:hover{
transform:scale(1.05);
}

/* NAV BUTTONS */

.nav{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:15px;
}

.nav a{
background:#142a48;
padding:10px 20px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.2s;
}

.nav a:hover{
background:#1f4d87;
transform:translateY(-2px);
}

/* COUNTDOWN */

.countdown{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.box{
background:#0e213c;
padding:15px;
border-radius:12px;
}

.number{
font-size:36px;
font-weight:900;
}

.label{
font-size:12px;
color:#9ed0ff;
letter-spacing:2px;
}

/* EVENTS */

.events{
margin-top:20px;
}

.events h2{
font-size:36px;
margin-bottom:15px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#0e213c;
border-radius:16px;
overflow:hidden;
text-decoration:none;
color:white;
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(0,150,255,0.4);
}

.card img{
width:100%;
display:block;
}

.card-text{
padding:12px;
font-size:20px;
font-weight:bold;
}

.card:hover .card-text{
color:#9ed0ff;
}

/* MOBILE */

@media(max-width:900px){

.cards{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:600px){

.cards{
grid-template-columns:1fr;
}

.countdown{
grid-template-columns:1fr 1fr;
}

.title{
font-size:38px;
}

}

</style>
</head>


<body>

<div class="video-bg">
<video autoplay muted loop playsinline>
<source src="./bg.mp4" type="video/mp4">
</video>
</div>

<div class="overlay"></div>

<div class="container">

<img src="apex_logo.png" class="logo">

<div class="hero">

<div class="badge">Official Opening Countdown</div>

<div class="title">VALHALLA OPENING</div>

<div class="subtitle">
03 Nisan 2026 • 22:00 Türkiye
</div>

<div class="meta">
<span>64 Bit Client</span>
<span>v1098</span>
<span>Orj MYKO</span>
</div>

<a class="prize" href="FORUM_ODUL_LINK" target="_blank">
1.500.000 TL ÖDÜL HAVUZU
</a>

<div class="nav">
<a href="https://apexmyko.net">Website</a>
<a href="FORUM_LINK">Forum</a>
<a href="https://discord.gg/apexmyko">Discord</a>
</div>

<div class="countdown">

<div class="box">
<div id="days" class="number">0</div>
<div class="label">GÜN</div>
</div>

<div class="box">
<div id="hours" class="number">0</div>
<div class="label">SAAT</div>
</div>

<div class="box">
<div id="minutes" class="number">0</div>
<div class="label">DAKİKA</div>
</div>

<div class="box">
<div id="seconds" class="number">0</div>
<div class="label">SANİYE</div>
</div>

</div>

</div>

<div class="events">

<h2>Aktif Etkinlikler</h2>

<div class="cards">

<a class="card" href="DISCORD_EVENT">
<img src="cekilis_discord.jpg">
<div class="card-text">Tıkla Git →</div>
</a>

<a class="card" href="YORUM_EVENT">
<img src="cekilis_yorum.jpg">
<div class="card-text">Tıkla Git →</div>
</a>

<a class="card" href="FORUM_EVENT">
<img src="cekilis_forum.jpg">
<div class="card-text">Tıkla Git →</div>
</a>

</div>

</div>

</div>


<script>

const target = new Date("2026-04-03T22:00:00+03:00").getTime();

function update(){

const now = new Date().getTime();
const diff = target - now;

const d = Math.floor(diff/(1000*60*60*24));
const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((diff%(1000*60*60))/(1000*60));
const s = Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerText=d;
document.getElementById("hours").innerText=h;
document.getElementById("minutes").innerText=m;
document.getElementById("seconds").innerText=s;

}

setInterval(update,1000);

</script>

</body>
</html>
