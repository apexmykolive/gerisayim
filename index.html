<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ApexMyKO Valhalla Opening</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:#020913 url("bg.jpg") center/cover fixed;
}

.container{
max-width:1200px;
margin:auto;
padding:30px 20px;
}

.logo{
width:200px;
margin-bottom:10px;
}

.badge{
display:inline-block;
padding:8px 18px;
border-radius:20px;
background:#0f2a4d;
color:#7cc3ff;
font-size:13px;
letter-spacing:2px;
margin-bottom:10px;
}

.title{
font-size:56px;
font-weight:900;
margin:10px 0;
}

.subtitle{
color:#9ec9ff;
margin-bottom:15px;
}

.infoBox{
display:inline-block;
padding:10px 18px;
border-radius:10px;
background:#0d1f37;
margin-bottom:20px;
font-weight:bold;
color:#8cc8ff;
}

.prizeBtn{
display:inline-block;
padding:14px 28px;
margin:10px;
background:linear-gradient(45deg,#ff7a00,#ffb400);
border-radius:10px;
text-decoration:none;
color:black;
font-weight:900;
font-size:16px;
box-shadow:0 0 15px rgba(255,150,0,0.5);
transition:0.2s;
}

.prizeBtn:hover{
transform:scale(1.05);
}

.menuBtn{
display:inline-block;
padding:10px 20px;
margin:5px;
background:#0f1a2b;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:bold;
}

.countdown{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

.box{
background:#0f1a2b;
padding:18px;
border-radius:12px;
min-width:100px;
}

.number{
font-size:38px;
font-weight:900;
}

.label{
font-size:12px;
color:#8ec5ff;
}

.section{
margin-top:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:20px;
}

.card{
border-radius:14px;
overflow:hidden;
background:#081421;
transition:0.25s;
}

.card:hover{
transform:translateY(-6px) scale(1.03);
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.card img{
width:100%;
display:block;
}

.cardTitle{
padding:12px;
font-weight:bold;
}

.footer{
margin-top:40px;
opacity:0.6;
font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<img src="apex_logo.png" class="logo">

<div class="badge">OFFICIAL OPENING COUNTDOWN</div>

<div class="title">VALHALLA OPENING</div>

<div class="subtitle">03 Nisan 2026 • 22:00 Türkiye</div>

<div class="infoBox">
64 Bit Client • v1098 Orj MYKO
</div>

<br>

<a class="prizeBtn" href="FORUM_LINK" target="_blank">
1.500.000 TL ÖDÜL HAVUZU
</a>

<br>

<a class="menuBtn" href="https://apexmyko.net" target="_blank">Website</a>
<a class="menuBtn" href="FORUM_LINK" target="_blank">Forum</a>
<a class="menuBtn" href="https://discord.gg/apexmyko" target="_blank">Discord</a>

<div class="countdown">

<div class="box">
<div class="number" id="days">0</div>
<div class="label">GÜN</div>
</div>

<div class="box">
<div class="number" id="hours">0</div>
<div class="label">SAAT</div>
</div>

<div class="box">
<div class="number" id="minutes">0</div>
<div class="label">DAKİKA</div>
</div>

<div class="box">
<div class="number" id="seconds">0</div>
<div class="label">SANİYE</div>
</div>

</div>

<div class="section">

<h2>Aktif Etkinlikler</h2>

<div class="cards">

<a class="card" href="FORUM_DISCORD_EVENT" target="_blank">
<img src="cekilis_discord.jpg">
<div class="cardTitle">Discord Davet Et Kazan</div>
</a>

<a class="card" href="FORUM_YORUM_EVENT" target="_blank">
<img src="cekilis_yorum.jpg">
<div class="cardTitle">Yorum Yap Kazan</div>
</a>

<a class="card" href="FORUM_FORUM_EVENT" target="_blank">
<img src="cekilis_forum.jpg">
<div class="cardTitle">Forum Çekilişi</div>
</a>

</div>

</div>

<div class="footer">
ApexMyKO • Valhalla 2026
</div>

</div>

<script>

const target = new Date("2026-04-03T22:00:00+03:00").getTime();

function update(){

const now = new Date().getTime();
const diff = target - now;

const d = Math.floor(diff / (1000*60*60*24));
const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((diff%(1000*60*60))/(1000*60));
const s = Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerText=d;
document.getElementById("hours").innerText=h;
document.getElementById("minutes").innerText=m;
document.getElementById("seconds").innerText=s;

}

setInterval(update,1000);

</script>

</body>
</html>
