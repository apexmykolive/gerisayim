<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ApexMyKO Valhalla Opening</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.9)),
url("bg.jpg");
background-size:cover;
background-attachment:fixed;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.logo{
width:180px;
margin-bottom:20px;
filter:drop-shadow(0 0 10px #00a2ff);
}

/* HERO PANEL */

.hero{
background:rgba(10,20,35,0.75);
border-radius:18px;
padding:40px 30px;
box-shadow:
0 0 40px rgba(0,150,255,0.15),
inset 0 0 30px rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

.badge{
display:inline-block;
padding:8px 20px;
border-radius:30px;
background:#0f2a4d;
color:#7cc3ff;
font-size:12px;
letter-spacing:2px;
margin-bottom:15px;
}

.title{
font-size:60px;
font-weight:900;
margin:10px 0;
}

.subtitle{
color:#9ec9ff;
margin-bottom:15px;
}

/* INFO BADGE */

.infoBox{
display:inline-block;
padding:10px 18px;
border-radius:12px;
background:#0e2a4b;
margin-bottom:20px;
font-weight:bold;
color:#9ed3ff;
}

/* PRIZE BUTTON */

.prizeBtn{
display:inline-block;
padding:16px 32px;
margin:15px 0;
background:linear-gradient(45deg,#ff7a00,#ffb400);
border-radius:12px;
text-decoration:none;
color:black;
font-weight:900;
font-size:18px;
box-shadow:0 0 20px rgba(255,160,0,0.6);
transition:0.25s;
}

.prizeBtn:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 0 30px rgba(255,180,0,0.8);
}

/* MENU */

.menu{
margin-top:10px;
}

.menu a{
display:inline-block;
padding:12px 22px;
margin:6px;
background:#0f1a2b;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.2s;
}

.menu a:hover{
background:#143458;
transform:translateY(-2px);
box-shadow:0 0 10px #2fa4ff;
}

/* COUNTDOWN */

.countdown{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.box{
background:#0f1a2b;
padding:22px;
border-radius:14px;
min-width:110px;
box-shadow:inset 0 0 10px rgba(0,0,0,0.5);
}

.number{
font-size:42px;
font-weight:900;
}

.label{
font-size:12px;
color:#8ec5ff;
}

/* EVENTS */

.section{
margin-top:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
margin-top:20px;
}

.card{
border-radius:14px;
overflow:hidden;
background:#081421;
transition:0.25s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:
0 15px 35px rgba(0,0,0,0.8),
0 0 20px rgba(0,140,255,0.5);
}

.card img{
width:100%;
display:block;
}

.cardTitle{
padding:14px;
font-weight:bold;
font-size:16px;
}

.footer{
margin-top:40px;
opacity:0.6;
font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<img src="apex_logo.png" class="logo">

<div class="hero">

<div class="badge">
OFFICIAL OPENING COUNTDOWN
</div>

<div class="title">
VALHALLA OPENING
</div>

<div class="subtitle">
03 Nisan 2026 • 22:00 Türkiye
</div>

<div class="infoBox">
64 Bit Client • v1098 Orj MYKO
</div>

<br>

<a class="prizeBtn" href="FORUM_LINK" target="_blank">
1.500.000 TL ÖDÜL HAVUZU
</a>

<div class="menu">
<a href="https://apexmyko.net" target="_blank">Website</a>
<a href="FORUM_LINK" target="_blank">Forum</a>
<a href="https://discord.gg/apexmyko" target="_blank">Discord</a>
</div>

<div class="countdown">

<div class="box">
<div class="number" id="days">0</div>
<div class="label">GÜN</div>
</div>

<div class="box">
<div class="number" id="hours">0</div>
<div class="label">SAAT</div>
</div>

<div class="box">
<div class="number" id="minutes">0</div>
<div class="label">DAKİKA</div>
</div>

<div class="box">
<div class="number" id="seconds">0</div>
<div class="label">SANİYE</div>
</div>

</div>

</div>

<div class="section">

<h2>Aktif Etkinlikler</h2>

<div class="cards">

<a class="card" href="FORUM_DISCORD_EVENT" target="_blank">
<img src="cekilis_discord.jpg">
<div class="cardTitle">Discord Davet Et Kazan</div>
</a>

<a class="card" href="FORUM_YORUM_EVENT" target="_blank">
<img src="cekilis_yorum.jpg">
<div class="cardTitle">Yorum Yap Kazan</div>
</a>

<a class="card" href="FORUM_FORUM_EVENT" target="_blank">
<img src="cekilis_forum.jpg">
<div class="cardTitle">Forum Çekilişi</div>
</a>

</div>

</div>

<div class="footer">
ApexMyKO • Valhalla Opening
</div>

</div>

<script>

const target = new Date("2026-04-03T22:00:00+03:00").getTime();

function update(){

const now = new Date().getTime();
const diff = target - now;

const d = Math.floor(diff / (1000*60*60*24));
const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((diff%(1000*60*60))/(1000*60));
const s = Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerText=d;
document.getElementById("hours").innerText=h;
document.getElementById("minutes").innerText=m;
document.getElementById("seconds").innerText=s;

}

setInterval(update,1000);

</script>

</body>
</html>
