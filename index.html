<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApexMyKO Valhalla Opening</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050b16;
color:white;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.logo{
width:340px;
margin-bottom:20px;
}

.title{
font-size:70px;
font-weight:900;
}

.subtitle{
color:#9ec9ff;
margin-bottom:25px;
}

.countdown{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.box{
background:#0f1a2b;
padding:25px;
border-radius:12px;
min-width:120px;
}

.number{
font-size:48px;
font-weight:900;
}

.label{
font-size:14px;
color:#8ec5ff;
letter-spacing:2px;
}

.section{
margin-top:70px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:30px;
}

.card img{
width:100%;
border-radius:10px;
}

.buttons{
margin-top:40px;
}

.btn{
display:inline-block;
padding:15px 30px;
margin:10px;
background:#2f8cff;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:bold;
}

.footer{
margin-top:60px;
opacity:0.7;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<img src="img/apex_logo.png" class="logo">

<div class="title">VALHALLA OPENING</div>

<div class="subtitle">
03 Nisan 2026 • 22:00 Türkiye
</div>

<div class="countdown">

<div class="box">
<div class="number" id="days">0</div>
<div class="label">GÜN</div>
</div>

<div class="box">
<div class="number" id="hours">0</div>
<div class="label">SAAT</div>
</div>

<div class="box">
<div class="number" id="minutes">0</div>
<div class="label">DAKİKA</div>
</div>

<div class="box">
<div class="number" id="seconds">0</div>
<div class="label">SANİYE</div>
</div>

</div>

<div class="section">

<h2>Aktif Etkinlikler</h2>

<div class="cards">

<div class="card">
<img src="img/cekilis_discord.jpg">
</div>

<div class="card">
<img src="img/cekilis_yorum.jpg">
</div>

<div class="card">
<img src="img/cekilis_forum.jpg">
</div>

</div>

</div>

<div class="buttons">

<a class="btn" href="https://apexmyko.net" target="_blank">
Website
</a>

<a class="btn" href="https://discord.gg/apexmyko" target="_blank">
Discord
</a>

<a class="btn" href="https://kick.com/apex-myko" target="_blank">
Canlı Yayın
</a>

</div>

<div class="footer">
64 Bit Client • v1098 Orj MYKO
</div>

</div>

<script>

const target = new Date("2026-04-03T22:00:00+03:00").getTime();

function update(){

const now = new Date().getTime();
const diff = target - now;

const d = Math.floor(diff / (1000*60*60*24));
const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((diff%(1000*60*60))/(1000*60));
const s = Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerText=d;
document.getElementById("hours").innerText=h;
document.getElementById("minutes").innerText=m;
document.getElementById("seconds").innerText=s;

}

setInterval(update,1000);

</script>

</body>
</html>
