<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ApexMyKO Valhalla Opening</title>

  <style>
    *{
      box-sizing:border-box;
    }

    :root{
      --bg-dark: rgba(5, 14, 28, 0.72);
      --panel: rgba(10, 22, 40, 0.78);
      --panel-border: rgba(120, 180, 255, 0.14);
      --blue: #8ec5ff;
      --blue-strong: #2f8cff;
      --white: #f4f7fb;
      --gold-a: #ff9800;
      --gold-b: #ffba08;
      --shadow: 0 20px 50px rgba(0,0,0,.35);
    }

    html, body{
      margin:0;
      padding:0;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--white);
      overflow-x:hidden;
      background:#050b16;
    }

    body{
      min-height:100vh;
      position:relative;
    }

    .bg-video{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-3;
      filter:brightness(.28) saturate(1.05);
    }

    .bg-overlay{
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at top center, rgba(24, 112, 255, 0.18), transparent 28%),
        linear-gradient(180deg, rgba(2,8,18,0.35) 0%, rgba(2,8,18,0.58) 35%, rgba(2,8,18,0.82) 100%);
      z-index:-2;
      pointer-events:none;
    }

    .container{
      max-width:1180px;
      margin:0 auto;
      padding:14px 18px 28px;
    }

    .logo-wrap{
      text-align:center;
      margin-bottom:8px;
    }

    .logo{
      width:170px;
      max-width:65vw;
      display:inline-block;
      filter:
        drop-shadow(0 0 12px rgba(0, 180, 255, 0.18))
        drop-shadow(0 10px 20px rgba(0,0,0,0.35));
    }

    .hero{
      max-width:860px;
      margin:0 auto;
      padding:18px 22px 20px;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(13,25,43,0.70), rgba(8,18,34,0.78));
      border:1px solid var(--panel-border);
      backdrop-filter: blur(10px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02),
        0 10px 35px rgba(0,0,0,0.35),
        0 0 24px rgba(47,140,255,0.10);
    }

    .badge{
      display:block;
      width:max-content;
      margin:0 auto 10px;
      padding:8px 18px;
      border-radius:999px;
      background:rgba(13, 53, 107, 0.90);
      color:#b8dcff;
      border:1px solid rgba(138, 198, 255, 0.15);
      letter-spacing:2px;
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      box-shadow:0 0 18px rgba(31,124,255,0.10);
    }

    .title{
      margin:0;
      text-align:center;
      font-size:clamp(38px, 6vw, 74px);
      line-height:.98;
      font-weight:900;
      letter-spacing:.5px;
      text-shadow:0 8px 25px rgba(0,0,0,.28);
    }

    .subtitle{
      margin:10px 0 0;
      text-align:center;
      color:var(--blue);
      font-size:clamp(15px, 1.8vw, 18px);
    }

    .hero-meta{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .meta-pill{
      padding:10px 14px;
      border-radius:12px;
      background:rgba(12, 42, 81, 0.92);
      color:#a9d5ff;
      font-weight:700;
      border:1px solid rgba(120,180,255,0.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }

    .prize-row{
      margin-top:14px;
      display:flex;
      justify-content:center;
    }

    .prize-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:300px;
      max-width:100%;
      padding:15px 28px;
      border-radius:16px;
      background:linear-gradient(135deg, var(--gold-a), var(--gold-b));
      color:#0f1012;
      text-decoration:none;
      font-weight:900;
      font-size:clamp(18px, 2vw, 20px);
      box-shadow:
        0 0 26px rgba(255,170,0,0.35),
        0 10px 24px rgba(0,0,0,0.25);
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .prize-btn:hover{
      transform:translateY(-2px) scale(1.02);
      filter:brightness(1.03);
      box-shadow:
        0 0 34px rgba(255,185,0,0.48),
        0 14px 28px rgba(0,0,0,0.30);
    }

    .nav-row{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .nav-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:110px;
      padding:12px 18px;
      border-radius:12px;
      background:linear-gradient(180deg, rgba(17,33,58,0.95), rgba(11,23,42,0.95));
      color:#fff;
      text-decoration:none;
      font-weight:800;
      border:1px solid rgba(124, 175, 255, 0.08);
      box-shadow:0 8px 20px rgba(0,0,0,.18);
      transition:all .18s ease;
    }

    .nav-btn:hover{
      transform:translateY(-2px);
      border-color:rgba(120, 180, 255, 0.24);
      box-shadow:
        0 0 18px rgba(47,140,255,.24),
        0 12px 24px rgba(0,0,0,.22);
      background:linear-gradient(180deg, rgba(23,49,83,0.95), rgba(12,28,50,0.95));
    }

    .countdown{
      display:grid;
      grid-template-columns:repeat(4, minmax(110px, 1fr));
      gap:14px;
      margin:18px auto 0;
      max-width:640px;
    }

    .count-box{
      padding:18px 12px 16px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(10, 24, 44, 0.96), rgba(7, 18, 34, 0.96));
      border:1px solid rgba(120,180,255,0.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 12px 20px rgba(0,0,0,.18);
    }

    .count-number{
      font-size:clamp(32px, 3.2vw, 54px);
      font-weight:900;
      line-height:1;
      text-shadow:0 6px 16px rgba(0,0,0,.20);
    }

    .count-label{
      margin-top:8px;
      font-size:13px;
      letter-spacing:2px;
      color:var(--blue);
      font-weight:700;
    }

    .events{
      margin-top:16px;
    }

    .events-title{
      margin:0 0 14px;
      text-align:center;
      font-size:clamp(28px, 4.4vw, 52px);
      font-weight:900;
      text-shadow:0 8px 20px rgba(0,0,0,.18);
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:18px;
    }

    .card{
      display:block;
      text-decoration:none;
      color:#fff;
      border-radius:20px;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(12,22,40,0.95), rgba(8,16,31,0.96));
      border:1px solid rgba(120,180,255,0.08);
      box-shadow:
        0 14px 32px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.02);
      transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
    }

    .card:hover{
      transform:translateY(-6px);
      border-color:rgba(120,180,255,0.24);
      box-shadow:
        0 20px 40px rgba(0,0,0,.34),
        0 0 24px rgba(47,140,255,.18);
    }

    .card img{
      width:100%;
      display:block;
      aspect-ratio: 4 / 5.6;
      object-fit:cover;
    }

    .card-cta{
      padding:14px 16px 16px;
      text-align:center;
      font-size:22px;
      font-weight:900;
      color:#ffffff;
      letter-spacing:.3px;
      text-shadow:0 0 10px rgba(255,255,255,0.10);
      transition:text-shadow .18s ease, color .18s ease;
    }

    .card:hover .card-cta{
      text-shadow:
        0 0 14px rgba(164, 214, 255, 0.26),
        0 0 24px rgba(47,140,255,0.18);
      color:#f8fbff;
    }

    .footer-space{
      height:8px;
    }

    @media (max-width: 980px){
      .cards{
        grid-template-columns:1fr 1fr;
      }

      .countdown{
        max-width:560px;
      }
    }

    @media (max-width: 640px){
      .container{
        padding:12px 12px 22px;
      }

      .logo{
        width:145px;
      }

      .hero{
        padding:16px 12px 18px;
        border-radius:18px;
      }

      .countdown{
        grid-template-columns:1fr 1fr;
        gap:10px;
        max-width:360px;
      }

      .cards{
        grid-template-columns:1fr;
      }

      .card-cta{
        font-size:20px;
      }

      .prize-btn{
        min-width:unset;
        width:100%;
      }

      .nav-btn{
        min-width:unset;
        width:calc(33.333% - 8px);
        padding:11px 8px;
      }
    }
  </style>
</head>
<body>

  <video autoplay muted loop playsinline class="bg-video">
    <source src="bg.mp4" type="video/mp4">
  </video>
  <div class="bg-overlay"></div>

  <div class="container">
    <div class="logo-wrap">
      <img src="apex_logo.png" alt="ApexMyKO Logo" class="logo">
    </div>

    <section class="hero">
      <div class="badge">Official Opening Countdown</div>

      <h1 class="title">VALHALLA OPENING</h1>

      <div class="subtitle">03 Nisan 2026 • 22:00 Türkiye</div>

      <div class="hero-meta">
        <div class="meta-pill">64 Bit Client</div>
        <div class="meta-pill">v1098</div>
        <div class="meta-pill">Orj MYKO</div>
      </div>

      <div class="prize-row">
        <a class="prize-btn" href="FORUM_ODUL_LINKI" target="_blank">1.500.000 TL ÖDÜL HAVUZU</a>
      </div>

      <div class="nav-row">
        <a class="nav-btn" href="https://apexmyko.net" target="_blank">Website</a>
        <a class="nav-btn" href="FORUM_ANA_LINK" target="_blank">Forum</a>
        <a class="nav-btn" href="https://discord.gg/apexmyko" target="_blank">Discord</a>
      </div>

      <div class="countdown">
        <div class="count-box">
          <div class="count-number" id="days">0</div>
          <div class="count-label">GÜN</div>
        </div>

        <div class="count-box">
          <div class="count-number" id="hours">0</div>
          <div class="count-label">SAAT</div>
        </div>

        <div class="count-box">
          <div class="count-number" id="minutes">0</div>
          <div class="count-label">DAKİKA</div>
        </div>

        <div class="count-box">
          <div class="count-number" id="seconds">0</div>
          <div class="count-label">SANİYE</div>
        </div>
      </div>
    </section>

    <section class="events">
      <h2 class="events-title">Aktif Etkinlikler</h2>

      <div class="cards">
        <a class="card" href="DISCORD_ETKINLIK_LINKI" target="_blank">
          <img src="cekilis_discord.jpg" alt="Discord Etkinliği">
          <div class="card-cta">Tıkla Git →</div>
        </a>

        <a class="card" href="YORUM_ETKINLIK_LINKI" target="_blank">
          <img src="cekilis_yorum.jpg" alt="Yorum Etkinliği">
          <div class="card-cta">Tıkla Git →</div>
        </a>

        <a class="card" href="FORUM_ETKINLIK_LINKI" target="_blank">
          <img src="cekilis_forum.jpg" alt="Forum Çekilişi">
          <div class="card-cta">Tıkla Git →</div>
        </a>
      </div>
    </section>

    <div class="footer-space"></div>
  </div>

  <script>
    const target = new Date("2026-04-03T22:00:00+03:00").getTime();

    function updateCountdown(){
      const now = new Date().getTime();
      const diff = target - now;

      if (diff <= 0) {
        document.getElementById("days").innerText = 0;
        document.getElementById("hours").innerText = 0;
        document.getElementById("minutes").innerText = 0;
        document.getElementById("seconds").innerText = 0;
        return;
      }

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById("days").innerText = d;
      document.getElementById("hours").innerText = h;
      document.getElementById("minutes").innerText = m;
      document.getElementById("seconds").innerText = s;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>
